<svg width="150" height="60" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 60">
  <style>
    .butterfly { fill: #E6007E; }
    .text { fill: #2D3748; font-family: Georgia, serif; font-weight: bold; }
  </style>
  
  <!-- Borboleta simplificada como no original -->
  <g transform="translate(20, 30)">
    <!-- Asas superiores -->
    <ellipse cx="-8" cy="-8" rx="8" ry="12" class="butterfly" transform="rotate(-20)"/>
    <ellipse cx="8" cy="-8" rx="8" ry="12" class="butterfly" transform="rotate(20)"/>
    
    <!-- Asas inferiores -->
    <ellipse cx="-6" cy="8" rx="6" ry="10" class="butterfly" transform="rotate(-30)"/>
    <ellipse cx="6" cy="8" rx="6" ry="10" class="butterfly" transform="rotate(30)"/>
    
    <!-- Corpo -->
    <rect x="-1" y="-15" width="2" height="25" fill="#2D3748" rx="1"/>
    
    <!-- Antenas -->
    <line x1="-1" y1="-15" x2="-4" y2="-20" stroke="#2D3748" stroke-width="1"/>
    <line x1="1" y1="-15" x2="4" y2="-20" stroke="#2D3748" stroke-width="1"/>
    <circle cx="-4" cy="-20" r="1" class="butterfly"/>
    <circle cx="4" cy="-20" r="1" class="butterfly"/>
  </g>
  
  <!-- Texto D&Z -->
  <text x="55" y="40" class="text" font-size="28">D&Z</text>
</svg>