<svg width="200" height="80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradiente para as asas da borboleta -->
    <linearGradient id="wingGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E6007E;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff1493;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C4006A;stop-opacity:1" />
    </linearGradient>
    
    <!-- Gradiente para o texto -->
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2d3748;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a202c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Borboleta -->
  <g transform="translate(35, 25)">
    <!-- Asa superior esquerda -->
    <path d="M-15 5 C-25 -5, -35 -2, -32 8 C-28 18, -18 15, -12 8 L-8 12" 
          fill="url(#wingGradient)" stroke="#1a1a1a" stroke-width="0.5"/>
    
    <!-- Asa superior direita -->
    <path d="M15 5 C25 -5, 35 -2, 32 8 C28 18, 18 15, 12 8 L8 12" 
          fill="url(#wingGradient)" stroke="#1a1a1a" stroke-width="0.5"/>
    
    <!-- Asa inferior esquerda -->
    <path d="M-12 15 C-22 12, -28 20, -25 28 C-22 36, -12 32, -8 22" 
          fill="url(#wingGradient)" stroke="#1a1a1a" stroke-width="0.5"/>
    
    <!-- Asa inferior direita -->
    <path d="M12 15 C22 12, 28 20, 25 28 C22 36, 12 32, 8 22" 
          fill="url(#wingGradient)" stroke="#1a1a1a" stroke-width="0.5"/>
    
    <!-- Corpo da borboleta -->
    <ellipse cx="0" cy="18" rx="1.5" ry="16" fill="#1a1a1a"/>
    
    <!-- Cabeça -->
    <circle cx="0" cy="5" r="2.5" fill="#1a1a1a"/>
    
    <!-- Antenas -->
    <path d="M-1.5 3 Q-6 -2, -8 -5" stroke="#1a1a1a" stroke-width="1" fill="none" stroke-linecap="round"/>
    <path d="M1.5 3 Q6 -2, 8 -5" stroke="#1a1a1a" stroke-width="1" fill="none" stroke-linecap="round"/>
    
    <!-- Pontas das antenas -->
    <circle cx="-8" cy="-5" r="1" fill="#E6007E"/>
    <circle cx="8" cy="-5" r="1" fill="#E6007E"/>
  </g>
  
  <!-- Texto D&Z -->
  <text x="85" y="45" font-family="Georgia, serif" font-size="32" font-weight="bold" 
        fill="url(#textGradient)" letter-spacing="2px">D&Z</text>
        
  <!-- Pequeno coração -->
  <g transform="translate(170, 30) scale(0.8)">
    <path d="M12,21.35l-1.45-1.32C5.4,15.36,2,12.28,2,8.5 C2,5.42,4.42,3,7.5,3c1.74,0,3.41,0.81,4.5,2.09C13.09,3.81,14.76,3,16.5,3 C19.58,3,22,5.42,22,8.5c0,3.78-3.4,6.86-8.55,11.54L12,21.35z" 
          fill="#E6007E" opacity="0.7"/>
  </g>
</svg>