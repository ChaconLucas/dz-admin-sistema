<svg width="120" height="50" xmlns="http://www.w3.org/2000/svg">
  <!-- Logo D&Z inspirada no original -->
  
  <!-- Borboleta estilizada -->
  <g transform="translate(15, 25)">
    <!-- Traços da borboleta como no original -->
    <path d="M-10 -5 Q-15 -10, -18 -8 Q-20 -5, -15 0 Q-10 5, -5 0" 
          fill="none" stroke="#E6007E" stroke-width="2" stroke-linecap="round"/>
    
    <path d="M10 -5 Q15 -10, 18 -8 Q20 -5, 15 0 Q10 5, 5 0" 
          fill="none" stroke="#E6007E" stroke-width="2" stroke-linecap="round"/>
          
    <path d="M-8 5 Q-12 8, -15 12 Q-12 15, -8 12 Q-5 8, -3 5" 
          fill="none" stroke="#E6007E" stroke-width="2" stroke-linecap="round"/>
          
    <path d="M8 5 Q12 8, 15 12 Q12 15, 8 12 Q5 8, 3 5" 
          fill="none" stroke="#E6007E" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Corpo central -->
    <line x1="0" y1="-8" x2="0" y2="15" stroke="#2D3748" stroke-width="1.5"/>
    
    <!-- Antenas -->
    <path d="M-1 -8 Q-3 -12, -5 -10" stroke="#2D3748" stroke-width="1" fill="none"/>
    <path d="M1 -8 Q3 -12, 5 -10" stroke="#2D3748" stroke-width="1" fill="none"/>
  </g>
  
  <!-- Texto D&Z elegante -->
  <text x="40" y="35" font-family="serif" font-size="24" font-weight="bold" fill="#2D3748">D&Z</text>
  
  <!-- Pequeno coração decorativo -->
  <path d="M95 20 C95 18, 97 16, 99 16 C101 16, 103 18, 103 20 C103 22, 99 26, 99 26 C99 26, 95 22, 95 20 Z" 
        fill="#E6007E" opacity="0.8"/>
</svg>