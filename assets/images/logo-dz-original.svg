<svg width="180" height="80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradiente principal D&Z -->
    <linearGradient id="dzGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E6007E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C4006A;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Borboleta mais fiel ao original -->
  <g transform="translate(25, 40)">
    <!-- Asa superior esquerda - mais orgânica -->
    <path d="M-8 0 C-18 -8, -28 -5, -25 5 C-22 15, -12 12, -5 5 Z" 
          fill="url(#dzGradient)" stroke="#000" stroke-width="1"/>
    
    <!-- Asa superior direita -->
    <path d="M8 0 C18 -8, 28 -5, 25 5 C22 15, 12 12, 5 5 Z" 
          fill="url(#dzGradient)" stroke="#000" stroke-width="1"/>
    
    <!-- Asa inferior esquerda -->
    <path d="M-5 8 C-15 5, -20 15, -15 20 C-10 25, -5 20, -2 15 Z" 
          fill="url(#dzGradient)" stroke="#000" stroke-width="1"/>
    
    <!-- Asa inferior direita -->
    <path d="M5 8 C15 5, 20 15, 15 20 C10 25, 5 20, 2 15 Z" 
          fill="url(#dzGradient)" stroke="#000" stroke-width="1"/>
    
    <!-- Corpo central -->
    <line x1="0" y1="-5" x2="0" y2="25" stroke="#000" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Antenas curvas -->
    <path d="M-1 -5 C-3 -10, -6 -12, -8 -10" stroke="#000" stroke-width="1.5" fill="none"/>
    <path d="M1 -5 C3 -10, 6 -12, 8 -10" stroke="#000" stroke-width="1.5" fill="none"/>
    
    <!-- Pontas das antenas */
    <circle cx="-8" cy="-10" r="1.5" fill="#E6007E"/>
    <circle cx="8" cy="-10" r="1.5" fill="#E6007E"/>
  </g>
  
  <!-- Texto D&Z com estilo mais elegante -->
  <g transform="translate(65, 25)">
    <!-- D -->
    <path d="M0 0 L0 30 L12 30 C20 30, 25 25, 25 15 C25 5, 20 0, 12 0 Z M6 6 L12 6 C16 6, 19 9, 19 15 C19 21, 16 24, 12 24 L6 24 Z" 
          fill="#2d3748" stroke="none"/>
    
    <!-- & -->
    <g transform="translate(35, 0)">
      <path d="M8 15 C8 20, 12 24, 17 24 C22 24, 26 20, 26 15 C26 12, 24 9, 21 7 L26 0 L20 0 L16 5 C14 3, 11 2, 8 2 C3 2, 0 6, 0 11 C0 14, 2 17, 5 19 C2 21, 0 24, 0 27 C0 29, 2 30, 4 30 C7 30, 8 28, 8 26 C8 24, 7 22, 5 21 C6 20, 7 18, 8 15 Z M6 11 C6 9, 7 8, 9 8 C10 8, 11 9, 11 10 C11 11, 10 12, 9 12 C7 12, 6 12, 6 11 Z" 
            fill="#2d3748"/>
    </g>
    
    <!-- Z -->
    <g transform="translate(70, 0)">
      <path d="M0 0 L0 6 L14 6 L0 24 L0 30 L22 30 L22 24 L8 24 L22 6 L22 0 Z" 
            fill="#2d3748"/>
    </g>
  </g>
</svg>